# Air — Go hot-reload for development.
# Docs: https://github.com/air-verse/air
# Install: go install github.com/air-verse/air@latest

root = "."
tmp_dir = ".air_tmp"

[build]
  cmd = "go build -o .air_tmp/server ./cmd/server"
  bin = ".air_tmp/server"
  delay = 500         # ms to wait after a file change before rebuilding
  exclude_dir = ["frontend", ".air_tmp", ".air_tmp_e2e", "db/migrations", "cmd/server/frontend_dist"]
  include_ext = ["go"]
  kill_delay = "0s"
  log = ".air_tmp/build.log"
  rerun = false
  send_interrupt = false
  stop_on_error = true

[log]
  main_only = false
  time = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[misc]
  clean_on_exit = true
