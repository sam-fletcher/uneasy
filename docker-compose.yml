services:
  # ── Postgres ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uneasy
      POSTGRES_PASSWORD: uneasy
      POSTGRES_DB: uneasy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-create the uneasy_test database on a fresh volume (e.g. after
      # `docker compose down -v`). Runs only when the data dir is empty.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uneasy"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go API server (with Air hot-reload) ─────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev   # lighter dev image; see below
    volumes:
      - .:/app                     # mount source so Air sees changes
      - go_cache:/root/go          # cache modules between restarts
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://uneasy:uneasy@db:5432/uneasy?sslmode=disable
      PORT: "8080"
      DEV_MODE: "true"
      UNEASY_DEV: "1"
      VITE_URL: "http://frontend:5173"
      # Passed through from the host's .env (gitignored); unset there means
      # unset here too, and the server falls back to its stdout-log dev
      # default (adr/NOTIFICATIONS_PLAN.md Session 3).
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    depends_on:
      db:
        condition: service_healthy
    command: air

  # ── Go API server bound to uneasy_test DB (for Playwright E2E) ──────────────
  # Mirrors `server` but points at the uneasy_test database on port 8090, so
  # automated tests can /api/dev/reset freely without touching the dev DB on
  # 8080. The uneasy_test database must already exist — see README.
  server-e2e:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go_cache:/root/go
    ports:
      - "8090:8090"
    environment:
      DATABASE_URL: postgres://uneasy:uneasy@db:5432/uneasy_test?sslmode=disable
      PORT: "8090"
      DEV_MODE: "true"
      UNEASY_DEV: "1"
      VITE_URL: "http://frontend:5173"
    depends_on:
      db:
        condition: service_healthy
    command: air -c .air.e2e.toml

  # ── Vite dev server (hot module replacement) ─────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      # Vite needs to know its public host for HMR websocket
      VITE_HMR_HOST: localhost

volumes:
  postgres_data:
  go_cache:
  node_modules:
